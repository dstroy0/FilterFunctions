name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub Pages deployment via Actions source.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress runs are cancelled on new push.
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Doxygen
        run: sudo apt-get install -y --no-install-recommends doxygen

      - name: Download doxygen-awesome.css v2.4.2
        run: |
          mkdir -p docs
          curl -sSfL \
            https://raw.githubusercontent.com/jothepro/doxygen-awesome-css/v2.4.2/doxygen-awesome.css \
            -o docs/doxygen-awesome.css

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
